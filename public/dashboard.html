<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCC Sentinel - System Health</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0; padding: 0;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }
  header {
    background: #1e293b;
    padding: 18px 28px;
    border-bottom: 1px solid #334155;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  header h1 { margin: 0; font-size: 20px; font-weight: 600; }
  header .meta { font-size: 13px; color: #94a3b8; }
  header a { color: #60a5fa; text-decoration: none; margin-left: 16px; font-size: 14px; }
  header a:hover { text-decoration: underline; }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  .summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat {
    background: #1e293b; border-radius: 8px; padding: 16px 20px;
    border-left: 4px solid #475569;
  }
  .stat.ok { border-left-color: #22c55e; }
  .stat.warn { border-left-color: #eab308; }
  .stat.bad { border-left-color: #ef4444; }
  .stat .n { font-size: 28px; font-weight: 700; }
  .stat .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }

  .section-title {
    font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #94a3b8; margin: 24px 0 12px; font-weight: 600;
  }

  .app-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }
  .app-card {
    background: #1e293b; border-radius: 10px; padding: 18px;
    border: 1px solid #334155;
    transition: border-color 0.15s;
  }
  .app-card:hover { border-color: #475569; }
  .app-card.critical { border-left: 4px solid #dc2626; }
  .app-card.minor { border-left: 4px solid #64748b; }

  .app-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 8px; margin-bottom: 12px;
  }
  .app-name {
    font-weight: 600; font-size: 15px; color: #f1f5f9;
    line-height: 1.3;
  }
  .app-url {
    font-size: 11px; color: #64748b; word-break: break-all; margin-top: 2px;
  }
  .app-url a { color: #64748b; text-decoration: none; }
  .app-url a:hover { color: #94a3b8; }

  .overall-dot {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    margin-top: 4px;
  }
  .overall-dot.pass { background: #22c55e; box-shadow: 0 0 10px rgba(34,197,94,0.4); }
  .overall-dot.fail { background: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.5); }
  .overall-dot.warn { background: #eab308; }
  .overall-dot.unknown { background: #475569; }

  .layer-row {
    display: grid; grid-template-columns: 56px 1fr auto;
    gap: 8px; padding: 6px 0;
    border-top: 1px solid #334155;
    font-size: 12px; align-items: center;
  }
  .layer-label { color: #94a3b8; font-weight: 500; }
  .layer-summary { color: #cbd5e1; }
  .layer-time { color: #64748b; font-size: 11px; }
  .status-pass { color: #4ade80; }
  .status-fail { color: #f87171; }
  .status-skip { color: #64748b; }
  .status-error { color: #fb923c; }
  .status-unknown { color: #475569; }

  .refresh-note {
    text-align: center; font-size: 12px; color: #64748b; margin-top: 32px;
  }
  .loading { text-align: center; padding: 80px 20px; color: #64748b; }
</style>
</head>
<body>
<header>
  <h1>🛡️ TCC Sentinel</h1>
  <div>
    <span class="meta" id="last-updated">Loading...</span>
    <a href="/admin">Admin</a>
  </div>
</header>

<div class="container">
  <div class="summary" id="summary"></div>

  <div class="section-title">Critical apps</div>
  <div class="app-grid" id="critical-grid"></div>

  <div class="section-title">Minor apps</div>
  <div class="app-grid" id="minor-grid"></div>

  <div class="refresh-note">Auto-refreshing every 60 seconds</div>
</div>

<script>
function statusClass(s) { return s ? 'status-' + s : 'status-unknown'; }

function timeAgo(iso) {
  if (!iso) return '—';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function overallStatus(latest) {
  const layers = [1, 2, 3, 4].map(n => latest['layer' + n]);
  const hasFail = layers.some(l => l && (l.status === 'fail' || l.status === 'error'));
  const hasPass = layers.some(l => l && l.status === 'pass');
  if (hasFail) return 'fail';
  if (hasPass) return 'pass';
  return 'unknown';
}

function renderCard(app) {
  const latest = app.latest || {};
  const overall = overallStatus(latest);
  const layers = [1, 2, 3, 4].map(n => {
    const r = latest['layer' + n];
    if (!r) {
      return `<div class="layer-row">
        <span class="layer-label">L${n}</span>
        <span class="layer-summary status-unknown">no data yet</span>
        <span class="layer-time">—</span>
      </div>`;
    }
    return `<div class="layer-row">
      <span class="layer-label">L${n}</span>
      <span class="layer-summary ${statusClass(r.status)}">${escapeHtml(r.summary || r.status)}</span>
      <span class="layer-time">${timeAgo(r.checked_at)}</span>
    </div>`;
  }).join('');

  return `<div class="app-card ${app.criticality}">
    <div class="app-header">
      <div>
        <div class="app-name">${escapeHtml(app.display_name)}</div>
        <div class="app-url"><a href="${escapeHtml(app.base_url)}" target="_blank">${escapeHtml(app.base_url)}</a></div>
      </div>
      <div class="overall-dot ${overall}"></div>
    </div>
    ${layers}
  </div>`;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function load() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    const apps = data.apps || [];

    const critical = apps.filter(a => a.criticality === 'critical');
    const minor = apps.filter(a => a.criticality !== 'critical');

    document.getElementById('critical-grid').innerHTML = critical.map(renderCard).join('');
    document.getElementById('minor-grid').innerHTML = minor.map(renderCard).join('');

    // Summary stats
    let passCount = 0, failCount = 0, unknownCount = 0;
    for (const a of apps) {
      const s = overallStatus(a.latest || {});
      if (s === 'pass') passCount++;
      else if (s === 'fail') failCount++;
      else unknownCount++;
    }
    document.getElementById('summary').innerHTML = `
      <div class="stat ok"><div class="n">${passCount}</div><div class="label">Healthy</div></div>
      <div class="stat bad"><div class="n">${failCount}</div><div class="label">Failing</div></div>
      <div class="stat warn"><div class="n">${unknownCount}</div><div class="label">No data</div></div>
      <div class="stat"><div class="n">${apps.length}</div><div class="label">Total apps</div></div>
    `;

    document.getElementById('last-updated').textContent =
      'Updated ' + new Date(data.generated_at).toLocaleTimeString();
  } catch (err) {
    document.getElementById('critical-grid').innerHTML =
      `<div class="loading">Error loading status: ${err.message}</div>`;
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>

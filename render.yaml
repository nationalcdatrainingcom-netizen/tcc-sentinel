services:
  - type: web
    name: tcc-sentinel
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false           # set to same connection string as Payroll Hub
      - key: HUB_JWT_SECRET
        value: tcc-hub-jwt-2026
      - key: SENDGRID_API_KEY
        sync: false           # same key you use elsewhere
      - key: SENTINEL_FROM_EMAIL
        value: billing@childrenscenterinc.com
      - key: SENTINEL_TO_EMAIL
        sync: false           # your email
      - key: SENTINEL_USERNAME
        value: sentinel
      - key: SENTINEL_PASSWORD
        sync: false           # the password you set for sentinel@ users
      - key: SENTINEL_SHARED_SECRET
        sync: false           # for Layer 3 /api/health auth
      - key: SENTINEL_DASHBOARD_URL
        value: https://tcc-sentinel.onrender.com
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: MARY_PHONE_NUMBER
        sync: false
